spring.application.name=class-room
server.port=8080
spring.config.import=optional:classpath:application-local.properties

spring.datasource.url=jdbc:postgresql://localhost:5432/classroom
spring.datasource.username=postgres
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

vaadin.launch-browser=false

app.content.about-title=About Our Classroom
app.content.about-body=We provide mobile-first virtual classes for teachers and students.
app.content.contact-title=Contact Us
app.content.contact-body=Reach out for support and onboarding.
app.content.support-email=support@classroom.local
app.content.support-phone=+8801700000000

app.bootstrap-admin.email=
app.bootstrap-admin.password=
app.bootstrap-admin.full-name=

livekit.url=
livekit.api-key=
livekit.api-secret=
